<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@500;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0b1524;
    --wp:#2271b1;
    --wp-bright:#54a6e6;
    --accent:#00a0d2;
    --ink:#f3f7fc;
    --muted:#8fa6c0;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%}
  body{background:var(--bg);color:var(--ink);font-family:'Inter',system-ui,sans-serif;
    display:flex;align-items:center;justify-content:center;overflow:hidden;
    -webkit-font-smoothing:antialiased}

  .bg{position:fixed;inset:0;z-index:0}
  .grad{position:absolute;inset:0;
    background:radial-gradient(75% 120% at 50% 8%, rgba(34,113,177,.42), rgba(34,113,177,0) 60%),
               linear-gradient(180deg,#0d1a2c 0%, #0b1524 60%, #091121 100%);}
  /* faint gutenberg-block grid */
  .grid{position:absolute;inset:0;opacity:.5;
    background-image:linear-gradient(rgba(84,166,230,.06) 1px, transparent 1px),
                     linear-gradient(90deg, rgba(84,166,230,.06) 1px, transparent 1px);
    background-size:48px 48px;}
  .glow{position:absolute;inset:0;
    background:radial-gradient(45% 60% at 50% 46%, rgba(0,160,210,.18), rgba(0,160,210,0) 70%);}
  .vignette{position:absolute;inset:0;
    background:radial-gradient(90% 100% at 50% 50%, rgba(0,0,0,0) 58%, rgba(4,9,17,.8) 100%);}

  .frame{position:fixed;inset:3.2vmin;z-index:1;border:1px solid rgba(84,166,230,.28)}
  .corner{position:absolute;width:2.4vmin;height:2.4vmin;border:0 solid var(--wp-bright);opacity:.8}
  .corner.tl{top:-1px;left:-1px;border-top-width:2px;border-left-width:2px}
  .corner.tr{top:-1px;right:-1px;border-top-width:2px;border-right-width:2px}
  .corner.bl{bottom:-1px;left:-1px;border-bottom-width:2px;border-left-width:2px}
  .corner.br{bottom:-1px;right:-1px;border-bottom-width:2px;border-right-width:2px}

  .stack{position:relative;z-index:2;text-align:center;
    display:flex;flex-direction:column;align-items:center;gap:2.2vmin;padding:4vmin}

  .kicker{font-weight:700;letter-spacing:.36em;text-transform:uppercase;font-size:1.9vmin;
    color:var(--wp-bright);display:flex;align-items:center;gap:1em}
  .kicker::before,.kicker::after{content:"▪";color:var(--accent);letter-spacing:0}

  .title{font-family:'JetBrains Mono',monospace;font-weight:800;font-size:12vmin;line-height:1;
    letter-spacing:-.02em;display:flex;align-items:center;
    filter:drop-shadow(0 0 24px rgba(34,113,177,.4))}
  .title .dollar{color:var(--muted)}
  .title .wp{color:var(--ink)}
  .title .arrow{color:var(--accent);margin:0 .04em}
  .title .claude{color:var(--wp-bright)}

  .rule{width:52vmin;height:.7vmin;border-radius:2px;margin-top:-.4vmin;
    background:linear-gradient(90deg, rgba(34,113,177,0), var(--wp) 20%, var(--accent) 50%, var(--wp) 80%, rgba(34,113,177,0));}

  .tag{font-size:2.4vmin;color:#d7e4f2;font-weight:600;max-width:82vmin}
  .tag b{color:var(--wp-bright)}

  .chip{font-family:'JetBrains Mono',monospace;font-size:2vmin;font-weight:500;color:#eaf2fb;
    background:rgba(6,16,30,.6);border:1px solid rgba(84,166,230,.45);border-radius:8px;
    padding:1.1vmin 2.4vmin;display:inline-flex;align-items:center;gap:1em;
    box-shadow:0 0 26px rgba(34,113,177,.14) inset}
  .chip .spin{color:var(--accent)}
  .chip .cur{width:.9vmin;height:2vmin;background:var(--wp-bright);display:inline-block;margin-left:.2em}
</style>
</head>
<body>
  <div class="bg">
    <div class="grad"></div>
    <div class="grid"></div>
    <div class="glow"></div>
    <div class="vignette"></div>
  </div>

  <div class="frame">
    <span class="corner tl"></span><span class="corner tr"></span>
    <span class="corner bl"></span><span class="corner br"></span>
  </div>

  <div class="stack">
    <div class="kicker">Spinner Verb Pack · For WordPress Developers</div>
    <div class="title"><span class="dollar">$</span><span class="wp">wordpress</span><span class="arrow">-&gt;</span><span class="claude">claude</span></div>
    <div class="rule"></div>
    <div class="tag">Claude Code's spinner, rewritten in <b>WordPress core</b>.</div>
    <div class="chip"><span class="spin">◍</span> Enqueuing&nbsp;the&nbsp;Scripts…<span class="cur"></span></div>
  </div>
</body>
</html>
